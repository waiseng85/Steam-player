<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>StreamLab · 多协议播放器</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flv.js@latest/dist/flv.min.js"></script>
<style>
:root {
  --bg:#1a1610; --bg2:#221e14; --bg3:#2e2818; --bg4:#3a3220;
  --border:#4a3e22; --border2:#6a5830;
  --accent:#f5a020; --accent2:#ffcc44; --accent3:#f07020;
  --ok:#7ecf60; --danger:#e05050;
  --text:#fff0d0; --text2:#c8a870; --text3:#806840;
  --mono:'IBM Plex Mono',monospace; --sans:'Noto Sans SC',sans-serif; --r:8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  background:var(--bg); color:var(--text);
  font-family:var(--sans); min-height:100vh;
  overflow-x:hidden;
}
body::before {
  content:''; position:fixed; inset:0;
  background:radial-gradient(circle at 15% 15%, rgba(245,160,32,.07) 0%, transparent 55%),
             radial-gradient(circle at 85% 85%, rgba(240,112,32,.05) 0%, transparent 55%);
  pointer-events:none; z-index:0;
}
.app { position:relative; z-index:1; display:flex; flex-direction:column; min-height:100vh; }

/* ── HEADER ── */
header {
  background:var(--bg2);
  border-bottom:2px solid var(--accent3);
  padding:0 16px; height:50px;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0; box-shadow:0 2px 16px rgba(245,160,32,.12);
  position:sticky; top:0; z-index:50;
}
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { width:24px; height:24px; background:linear-gradient(135deg,var(--accent2),var(--accent3)); clip-path:polygon(0 0,100% 50%,0 100%); box-shadow:0 0 10px rgba(245,160,32,.5); flex-shrink:0; }
.logo-name { font-family:var(--mono); font-size:.9rem; font-weight:600; color:var(--accent2); letter-spacing:2px; }
.logo-ver { font-family:var(--mono); font-size:.55rem; color:var(--text3); background:var(--bg3); border:1px solid var(--border); padding:1px 5px; border-radius:3px; }
.proto-badges { display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; }
.pbadge { font-family:var(--mono); font-size:.5rem; padding:2px 5px; border-radius:3px; border:1px solid; letter-spacing:1px; }
.pbadge.hls  { color:#f5a020; border-color:#f5a020; background:rgba(245,160,32,.1); }
.pbadge.dash { color:#ffcc44; border-color:#ffcc44; background:rgba(255,204,68,.1); }
.pbadge.mpd  { color:#f07020; border-color:#f07020; background:rgba(240,112,32,.1); }
.pbadge.flv  { color:#e08840; border-color:#e08840; background:rgba(224,136,64,.1); }
.pbadge.mp4  { color:#c8a870; border-color:#c8a870; background:rgba(200,168,112,.1); }

/* ── MAIN CONTENT ── */
.main-content {
  flex:1;
  display:flex;
  flex-direction:column; /* MOBILE: stacked */
}

/* ── INPUT BAR ── */
.input-bar {
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:10px 14px;
  display:flex; flex-direction:column; gap:8px;
}
.url-row { display:flex; gap:8px; }
.url-input {
  flex:1; min-width:0;
  background:var(--bg3); border:1px solid var(--border);
  border-radius:var(--r); padding:10px 12px;
  font-family:var(--mono); font-size:.78rem;
  color:var(--text); outline:none;
  transition:border-color .2s, box-shadow .2s;
}
.url-input::placeholder { color:var(--text3); }
.url-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(245,160,32,.12); }

.btn {
  font-family:var(--mono); font-size:.72rem; font-weight:600;
  padding:10px 14px; border-radius:var(--r); border:none;
  cursor:pointer; letter-spacing:1px; transition:all .15s; white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent3)); color:#1a1000; box-shadow:0 2px 10px rgba(245,160,32,.25); }
.btn-primary:active { filter:brightness(.9); transform:scale(.97); }
.btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text2); }
.btn-ghost:active { border-color:var(--accent); color:var(--accent); }

.opts-row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; overflow-x:auto; padding-bottom:2px; }
.opts-label { font-family:var(--mono); font-size:.58rem; color:var(--text3); letter-spacing:1px; white-space:nowrap; }
.proto-btn {
  font-family:var(--mono); font-size:.58rem;
  padding:4px 8px; border-radius:4px;
  border:1px solid var(--border); background:transparent;
  color:var(--text3); cursor:pointer; letter-spacing:1px;
  transition:all .15s; white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.proto-btn:active, .proto-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(245,160,32,.12); }
.sep { width:1px; height:14px; background:var(--border); flex-shrink:0; }

/* ── PLAYER ── */
.player-section {
  background:#100c06;
  display:flex; flex-direction:column;
}
.player-topbar {
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:7px 12px; display:flex; align-items:center;
  justify-content:space-between; gap:8px; flex-shrink:0;
}
.now-playing { display:flex; align-items:center; gap:8px; min-width:0; flex:1; }
.dot { width:7px; height:7px; border-radius:50%; background:var(--text3); flex-shrink:0; }
.dot.live    { background:#f04040; box-shadow:0 0 7px #f04040; animation:blink 1.4s infinite; }
.dot.ready   { background:var(--ok); box-shadow:0 0 5px var(--ok); }
.dot.loading { background:var(--accent); animation:blink .7s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }
.now-title { font-family:var(--mono); font-size:.65rem; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.stats-inline { display:flex; gap:8px; font-family:var(--mono); font-size:.58rem; flex-shrink:0; flex-wrap:wrap; }
.stat { display:flex; gap:4px; }
.stat-k { color:var(--text3); }
.stat-v { color:var(--accent2); }

/* TRACK BAR */
.track-bar {
  background:var(--bg3); border-bottom:1px solid var(--border);
  padding:6px 12px; display:none;
  align-items:center; gap:8px; flex-wrap:wrap; flex-shrink:0;
  overflow-x:auto;
}
.track-group { display:flex; align-items:center; gap:5px; }
.track-label { font-family:var(--mono); font-size:.58rem; color:var(--text3); white-space:nowrap; }
.track-select {
  background:var(--bg4); border:1px solid var(--border);
  border-radius:4px; padding:4px 6px;
  font-family:var(--mono); font-size:.62rem; color:var(--text);
  outline:none; cursor:pointer; max-width:130px;
}
.track-select option { background:var(--bg3); }
.track-sep { width:1px; height:18px; background:var(--border); flex-shrink:0; }

/* VIDEO */
.video-wrap {
  background:#000;
  position:relative;
  /* 16:9 on mobile */
  aspect-ratio:16/9;
  display:flex; align-items:center; justify-content:center;
  width:100%;
}
.placeholder { display:flex; flex-direction:column; align-items:center; gap:14px; }
.play-icon { width:64px; height:64px; border:2px solid var(--bg4); border-radius:50%; display:flex; align-items:center; justify-content:center; }
.play-icon::after { content:''; width:0; height:0; border-top:13px solid transparent; border-bottom:13px solid transparent; border-left:20px solid var(--bg4); margin-left:6px; }
.placeholder p { font-family:var(--mono); font-size:.65rem; letter-spacing:2px; color:var(--text3); }
video#player { width:100%; height:100%; display:none; background:#000; outline:none; }
.error-bar { display:none; background:rgba(224,80,80,.1); border-top:1px solid rgba(224,80,80,.3); padding:8px 12px; font-family:var(--mono); font-size:.68rem; color:#f09090; }

/* ── CHANNEL PANEL ── */
.channel-panel {
  background:var(--bg2);
  border-top:2px solid var(--border);
  display:flex; flex-direction:column;
  /* Mobile: fixed height, scrollable */
  min-height:0;
}
.panel-head {
  padding:10px 13px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0; background:var(--bg3);
  position:sticky; top:50px; z-index:10;
}
.panel-title { font-family:var(--mono); font-size:.65rem; color:var(--text2); letter-spacing:2px; text-transform:uppercase; }
.panel-head-right { display:flex; align-items:center; gap:8px; }
.ch-count { font-family:var(--mono); font-size:.6rem; background:linear-gradient(135deg,var(--accent),var(--accent3)); color:#1a1000; padding:2px 7px; border-radius:10px; font-weight:600; }
.reload-btn { font-family:var(--mono); font-size:.6rem; background:transparent; border:1px solid var(--border); color:var(--text3); padding:3px 8px; border-radius:4px; cursor:pointer; transition:all .15s; }
.reload-btn:active { border-color:var(--accent); color:var(--accent); }

/* Group tabs */
.group-tabs {
  padding:6px 10px; border-bottom:1px solid var(--border);
  display:flex; gap:5px; flex-wrap:nowrap;
  overflow-x:auto; flex-shrink:0;
  scrollbar-width:none;
}
.group-tabs::-webkit-scrollbar { display:none; }
.group-tab {
  font-family:var(--mono); font-size:.58rem;
  padding:4px 10px; border-radius:12px;
  border:1px solid var(--border); background:transparent;
  color:var(--text3); cursor:pointer; white-space:nowrap;
  transition:all .15s; flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.group-tab:active, .group-tab.active { border-color:var(--accent); color:var(--accent); background:rgba(245,160,32,.1); }

/* Manual input */
.manual-row {
  padding:8px 10px; border-bottom:1px solid var(--border);
  display:flex; gap:6px; flex-shrink:0;
}
.manual-input {
  flex:1; min-width:0;
  background:var(--bg3); border:1px solid var(--border);
  border-radius:6px; padding:8px 10px;
  font-family:var(--mono); font-size:.7rem;
  color:var(--text); outline:none;
}
.manual-input::placeholder { color:var(--text3); }
.manual-input:focus { border-color:var(--accent); }
.manual-row .btn { padding:8px 14px; font-size:.65rem; }

/* Channel list */
.ch-list {
  overflow-y:auto;
  padding:6px;
  /* mobile: show enough channels */
  max-height:320px;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
.ch-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 10px; border-radius:8px;
  cursor:pointer; margin-bottom:4px;
  border:1px solid transparent;
  transition:all .15s; background:var(--bg3);
  -webkit-tap-highlight-color:transparent;
}
.ch-item:active, .ch-item.active { border-color:var(--accent); background:rgba(245,160,32,.1); box-shadow:inset 3px 0 0 var(--accent); }
.ch-play-btn {
  width:34px; height:34px; background:var(--bg4);
  border-radius:50%; display:flex; align-items:center;
  justify-content:center; flex-shrink:0; transition:all .15s;
}
.ch-item.active .ch-play-btn { background:var(--accent); box-shadow:0 0 8px rgba(245,160,32,.4); }
.ch-play-btn::after { content:''; width:0; height:0; border-top:6px solid transparent; border-bottom:6px solid transparent; border-left:10px solid var(--text2); margin-left:3px; }
.ch-item.active .ch-play-btn::after { border-left-color:#1a1000; }
.ch-info { flex:1; min-width:0; }
.ch-name { font-size:.82rem; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ch-meta { display:flex; gap:8px; margin-top:2px; }
.ch-proto { font-family:var(--mono); font-size:.55rem; color:var(--text3); }
.ch-group { font-family:var(--mono); font-size:.55rem; color:var(--accent3); }
.empty-ch { text-align:center; padding:28px 14px; font-family:var(--mono); font-size:.68rem; color:var(--text3); line-height:2.2; }

/* LOG BAR */
.log-bar {
  background:var(--bg2); border-top:1px solid var(--border);
  padding:5px 12px; display:flex; gap:16px;
  overflow-x:auto; flex-shrink:0;
  scrollbar-width:none;
}
.log-bar::-webkit-scrollbar { display:none; }
.log-e { font-family:var(--mono); font-size:.58rem; color:var(--text3); white-space:nowrap; display:flex; gap:7px; }
.log-t { color:var(--text3); }
.log-m.ok   { color:var(--ok); }
.log-m.err  { color:var(--danger); }
.log-m.info { color:var(--accent2); }

/* ════════════════════════════════════
   TABLET / DESKTOP  (≥ 768px)
   ════════════════════════════════════ */
@media (min-width: 768px) {
  .main-content {
    flex-direction:row; /* side by side */
    flex:1;
    overflow:hidden;
  }

  .left-col {
    flex:1; min-width:0;
    display:flex; flex-direction:column;
    overflow:hidden;
  }

  .channel-panel {
    width:300px; flex-shrink:0;
    border-top:none;
    border-left:1px solid var(--border);
    overflow:hidden;
  }

  .panel-head {
    position:static; /* no sticky needed on desktop */
  }

  .ch-list {
    max-height:none; /* fill remaining height */
    flex:1;
  }

  .video-wrap {
    aspect-ratio:unset;
    flex:1; /* fill remaining height */
  }

  .player-section {
    flex:1; overflow:hidden;
  }
}

/* ════════════════════════════════════
   LARGE DESKTOP (≥ 1200px)
   ════════════════════════════════════ */
@media (min-width: 1200px) {
  .channel-panel { width:320px; }
  .url-input { font-size:.82rem; }
  .ch-name { font-size:.88rem; }
}

/* scrollbar */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon"></div>
    <span class="logo-name">STREAMLAB</span>
    <span class="logo-ver">v4.1</span>
  </div>
  <div class="proto-badges">
    <span class="pbadge hls">HLS</span>
    <span class="pbadge dash">DASH</span>
    <span class="pbadge mpd">MPD</span>
    <span class="pbadge flv">FLV</span>
    <span class="pbadge mp4">MP4</span>
  </div>
</header>

<div class="main-content">

  <!-- LEFT COL (wraps input + player on desktop) -->
  <div class="left-col">

    <!-- INPUT BAR -->
    <div class="input-bar">
      <div class="url-row">
        <input id="urlInput" class="url-input" type="text" placeholder=".mpd / .m3u8 / .flv / .mp4 ...">
        <button class="btn btn-primary" onclick="loadStream()">▶</button>
        <button class="btn btn-ghost"   onclick="stopAll()">■</button>
      </div>
      <div class="opts-row">
        <span class="opts-label">协议：</span>
        <button class="proto-btn active" data-p="auto"   onclick="setProto(this)">AUTO</button>
        <button class="proto-btn"        data-p="hls"    onclick="setProto(this)">HLS</button>
        <button class="proto-btn"        data-p="dash"   onclick="setProto(this)">DASH/MPD</button>
        <button class="proto-btn"        data-p="flv"    onclick="setProto(this)">FLV</button>
        <button class="proto-btn"        data-p="native" onclick="setProto(this)">MP4</button>
      </div>
    </div>

    <!-- PLAYER -->
    <div class="player-section">
      <div class="player-topbar">
        <div class="now-playing">
          <div class="dot" id="dot"></div>
          <span class="now-title" id="nowTitle">选择频道或输入链接</span>
        </div>
        <div class="stats-inline" id="statsInline" style="display:none">
          <div class="stat"><span class="stat-k">P</span><span class="stat-v" id="sStat">—</span></div>
          <div class="stat"><span class="stat-k">R</span><span class="stat-v" id="rStat">—</span></div>
          <div class="stat"><span class="stat-k">B</span><span class="stat-v" id="bStat">—</span></div>
        </div>
      </div>

      <!-- TRACK BAR -->
      <div class="track-bar" id="trackBar">
        <div class="track-group">
          <span class="track-label">🎬</span>
          <select class="track-select" id="qualitySelect" onchange="setQuality(this.value)">
            <option value="-1">自动</option>
          </select>
        </div>
        <div class="track-sep"></div>
        <div class="track-group">
          <span class="track-label">🔊</span>
          <select class="track-select" id="audioSelect" onchange="setAudio(this.value)">
            <option value="">默认</option>
          </select>
        </div>
        <div class="track-sep"></div>
        <div class="track-group">
          <span class="track-label">💬</span>
          <select class="track-select" id="subtitleSelect" onchange="setSubtitle(this.value)">
            <option value="-1">关闭</option>
          </select>
        </div>
      </div>

      <div class="video-wrap" id="videoWrap">
        <div class="placeholder" id="placeholder">
          <div class="play-icon"></div>
          <p>选择频道开始播放</p>
        </div>
        <video id="player" controls playsinline></video>
      </div>
      <div class="error-bar" id="errorBar"></div>
    </div>

  </div><!-- .left-col -->

  <!-- CHANNEL PANEL -->
  <div class="channel-panel">
    <div class="panel-head">
      <span class="panel-title">频道列表</span>
      <div class="panel-head-right">
        <button class="reload-btn" onclick="fetchChannels()">↺</button>
        <span class="ch-count" id="chCount">0</span>
      </div>
    </div>

    <div class="group-tabs" id="groupTabs"></div>

    <div class="manual-row">
      <input id="manualUrl" class="manual-input" type="url" placeholder="临时输入链接直接播放...">
      <button class="btn btn-primary" onclick="playManual()">▶</button>
    </div>

    <div class="ch-list" id="chList">
      <div class="empty-ch">⏳ 加载频道中...</div>
    </div>
  </div>

</div><!-- .main-content -->

<!-- LOG BAR -->
<div class="log-bar" id="logBar">
  <div class="log-e"><span class="log-t">--:--:--</span><span class="log-m info">StreamLab v4.1 · 手机竖屏 + 电脑宽屏</span></div>
</div>

</div><!-- .app -->

<script>
let proto='auto', hlsInst=null, dashInst=null, flvInst=null, ticker=null;
let channels=[], activeIdx=-1, activeGroup='全部', currentEngine='';

const video       = document.getElementById('player');
const urlInput    = document.getElementById('urlInput');
const dot         = document.getElementById('dot');
const nowTitle    = document.getElementById('nowTitle');
const errorBar    = document.getElementById('errorBar');
const statsInline = document.getElementById('statsInline');
const placeholder = document.getElementById('placeholder');
const chList      = document.getElementById('chList');
const logBar      = document.getElementById('logBar');
const trackBar    = document.getElementById('trackBar');
const qualitySel  = document.getElementById('qualitySelect');
const audioSel    = document.getElementById('audioSelect');
const subtitleSel = document.getElementById('subtitleSelect');

// ── UTILS ────────────────────────────
const ts = () => new Date().toTimeString().slice(0,8);
function log(msg, type='info') {
  const d = document.createElement('div');
  d.className = 'log-e';
  d.innerHTML = `<span class="log-t">${ts()}</span><span class="log-m ${type}">${msg}</span>`;
  logBar.prepend(d);
  while(logBar.children.length > 5) logBar.removeChild(logBar.lastChild);
}
function setDot(s) { dot.className = 'dot ' + s; }
function showError(msg) { errorBar.style.display='block'; errorBar.textContent='⚠ '+msg; log(msg,'err'); setDot(''); nowTitle.textContent='错误'; }
function clearErr() { errorBar.style.display='none'; }
function detectProto(url) {
  if(!url) return 'native';
  const u = url.toLowerCase().split('?')[0];
  if(u.endsWith('.m3u8')||u.includes('.m3u8')) return 'hls';
  if(u.endsWith('.mpd') ||u.includes('.mpd'))  return 'dash';
  if(u.endsWith('.flv'))                        return 'flv';
  if(u.startsWith('rtmp'))                      return 'rtmp';
  return 'native';
}
const protoLabel = p => ({hls:'HLS',dash:'DASH/MPD',flv:'FLV',native:'MP4',rtmp:'RTMP'}[p]||p.toUpperCase());
function fmtTime(s) { if(!isFinite(s))return'∞'; const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=Math.floor(s%60); return h?`${h}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`:`${m}:${String(ss).padStart(2,'0')}`; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function setProto(btn) { document.querySelectorAll('.proto-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); proto=btn.dataset.p; }

// ── TRACK BAR ────────────────────────
function resetTrackBar() { qualitySel.innerHTML='<option value="-1">自动</option>'; audioSel.innerHTML='<option value="">默认</option>'; subtitleSel.innerHTML='<option value="-1">关闭</option>'; trackBar.style.display='none'; }
function showTB() { trackBar.style.display='flex'; }
function buildQ_HLS() { if(!hlsInst)return; const lv=hlsInst.levels; if(!lv||lv.length<=1)return; qualitySel.innerHTML='<option value="-1">自动</option>'; lv.forEach((l,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`${l.height||'?'}p`;qualitySel.appendChild(o);}); showTB(); }
function buildQ_DASH() { if(!dashInst)return; try{const bl=dashInst.getBitrateInfoListFor('video');if(!bl||bl.length<=1)return;qualitySel.innerHTML='<option value="-1">自动</option>';bl.forEach((b,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`${b.height||'?'}p`;qualitySel.appendChild(o);});showTB();}catch(e){} }
function buildA_HLS() { if(!hlsInst)return; const t=hlsInst.audioTracks; if(!t||t.length<=1)return; audioSel.innerHTML=''; t.forEach((t,i)=>{const o=document.createElement('option');o.value=i;o.textContent=t.name||t.lang||`音轨${i+1}`;audioSel.appendChild(o);}); showTB(); }
function buildA_DASH() { if(!dashInst)return; try{const t=dashInst.getTracksFor('audio');if(!t||t.length<=1)return;audioSel.innerHTML='';t.forEach((t,i)=>{const o=document.createElement('option');o.value=i;o.textContent=t.lang||`音轨${i+1}`;audioSel.appendChild(o);});showTB();}catch(e){} }
function buildS_HLS() { if(!hlsInst)return; const t=hlsInst.subtitleTracks; if(!t||t.length===0)return; subtitleSel.innerHTML='<option value="-1">关闭</option>'; t.forEach((t,i)=>{const o=document.createElement('option');o.value=i;o.textContent=t.name||t.lang||`字幕${i+1}`;subtitleSel.appendChild(o);}); showTB(); }
function buildS_DASH() { if(!dashInst)return; try{const t=dashInst.getTracksFor('text');if(!t||t.length===0)return;subtitleSel.innerHTML='<option value="-1">关闭</option>';t.forEach((t,i)=>{const o=document.createElement('option');o.value=i;o.textContent=t.lang||`字幕${i+1}`;subtitleSel.appendChild(o);});showTB();}catch(e){} }
function setQuality(val) { const v=parseInt(val); if(currentEngine==='hls'&&hlsInst){hlsInst.currentLevel=v;hlsInst.loadLevel=v;} else if(currentEngine==='dash'&&dashInst){if(v===-1){dashInst.updateSettings({streaming:{abr:{autoSwitchBitrate:{video:true}}}});}else{dashInst.updateSettings({streaming:{abr:{autoSwitchBitrate:{video:false}}}});dashInst.setQualityFor('video',v);}} log(`画质 → ${qualitySel.options[qualitySel.selectedIndex]?.text}`,'info'); }
function setAudio(val) { if(val==='')return; const v=parseInt(val); if(currentEngine==='hls'&&hlsInst){hlsInst.audioTrack=v;} else if(currentEngine==='dash'&&dashInst){try{const t=dashInst.getTracksFor('audio');if(t&&t[v])dashInst.setCurrentTrack(t[v]);}catch(e){}} log(`音轨 → ${audioSel.options[audioSel.selectedIndex]?.text}`,'info'); }
function setSubtitle(val) { const v=parseInt(val); if(currentEngine==='hls'&&hlsInst){hlsInst.subtitleTrack=v;} else if(currentEngine==='dash'&&dashInst){try{if(v===-1){dashInst.setTextTrack(-1);}else{const t=dashInst.getTracksFor('text');if(t&&t[v]){dashInst.setCurrentTrack(t[v]);dashInst.setTextTrack(v);}}}catch(e){}} }

// ── DESTROY ──────────────────────────
function destroyAll() {
  if(hlsInst){hlsInst.destroy();hlsInst=null;}
  if(dashInst){dashInst.reset();dashInst=null;}
  if(flvInst){flvInst.destroy();flvInst=null;}
  if(ticker){clearInterval(ticker);ticker=null;}
  video.pause(); video.removeAttribute('src'); video.load();
  video.style.display='none'; placeholder.style.display='flex';
  statsInline.style.display='none'; resetTrackBar(); clearErr(); currentEngine='';
}
function stopAll() { destroyAll(); setDot(''); nowTitle.textContent='已停止'; activeIdx=-1; renderChannels(); log('已停止','info'); }

// ── LOAD ─────────────────────────────
function loadStream(url, name) {
  url = url || urlInput.value.trim();
  if(!url){showError('请输入链接');return;}
  urlInput.value = url;
  destroyAll(); setDot('loading');
  nowTitle.textContent = name || (url.length>50 ? url.slice(0,50)+'…' : url);
  log(`加载: ${name||url.slice(0,55)}`,'info');
  const p = proto==='auto' ? detectProto(url) : proto;
  document.getElementById('sStat').textContent = protoLabel(p);
  video.onloadedmetadata = () => { const w=video.videoWidth,h=video.videoHeight; if(w&&h)document.getElementById('rStat').textContent=`${w}×${h}`; };
  video.onplay    = () => { setDot('live'); statsInline.style.display='flex'; log('▶ 播放中','ok'); startTicker(); };
  video.onpause   = () => { setDot('ready'); };
  video.onwaiting = () => { setDot('loading'); };
  video.onended   = () => { setDot('ready'); log('⏹ 结束','info'); };
  video.onerror   = () => { const c=video.error?video.error.code:'?'; const m={1:'中止',2:'网络/CORS',3:'解码失败',4:'格式不支持'}; showError(`失败(${c}): ${m[c]||'未知'}`); };
  video.style.display='block'; placeholder.style.display='none';
  switch(p) {
    case 'hls':   loadHLS(url);   break;
    case 'dash':  loadDASH(url);  break;
    case 'flv':   loadFLV(url);   break;
    case 'rtmp':  showError('RTMP不支持直连，请用HLS或HTTP-FLV'); break;
    default:      loadNative(url);
  }
}
function loadHLS(url) {
  if(!Hls.isSupported()){if(video.canPlayType('application/vnd.apple.mpegurl')){loadNative(url);}else{showError('不支持HLS');}return;}
  currentEngine='hls'; hlsInst=new Hls({enableWorker:true,lowLatencyMode:true});
  hlsInst.loadSource(url); hlsInst.attachMedia(video);
  hlsInst.on(Hls.Events.MANIFEST_PARSED,()=>{ log('HLS OK','ok'); video.play().catch(()=>{}); setTimeout(()=>{buildQ_HLS();buildA_HLS();buildS_HLS();},500); });
  hlsInst.on(Hls.Events.ERROR,(e,d)=>{ if(d.fatal){showError('HLS: '+d.details); hlsInst.destroy();} });
  hlsInst.on(Hls.Events.LEVEL_SWITCHED,(e,d)=>{ const l=hlsInst.levels[d.level]; if(l)document.getElementById('rStat').textContent=`${l.width}×${l.height}`; });
  document.getElementById('sStat').textContent='HLS';
}
function loadDASH(url) {
  if(typeof dashjs==='undefined'){showError('dash.js未加载');return;}
  currentEngine='dash'; dashInst=dashjs.MediaPlayer().create();
  dashInst.initialize(video,url,true);
  dashInst.updateSettings({streaming:{abr:{autoSwitchBitrate:{video:true}}}});
  dashInst.on(dashjs.MediaPlayer.events.STREAM_INITIALIZED,()=>{ log('DASH/MPD OK','ok'); document.getElementById('sStat').textContent='DASH/MPD'; setTimeout(()=>{buildQ_DASH();buildA_DASH();buildS_DASH();},800); });
  dashInst.on(dashjs.MediaPlayer.events.ERROR,e=>{ showError('DASH: '+(e.error?.message||JSON.stringify(e.error))); });
  dashInst.on(dashjs.MediaPlayer.events.QUALITY_CHANGE_RENDERED,e=>{ if(e.mediaType==='video'){try{const info=dashInst.getBitrateInfoListFor('video');const cur=dashInst.getQualityFor('video');if(info&&info[cur])document.getElementById('rStat').textContent=`${info[cur].width||'?'}×${info[cur].height||'?'}`;}catch(ex){}} });
}
function loadFLV(url) {
  if(!flvjs.isSupported()){showError('不支持FLV');return;}
  currentEngine='flv'; const isLive=url.includes('live')||!url.toLowerCase().endsWith('.flv');
  flvInst=flvjs.createPlayer({type:'flv',url,isLive,hasAudio:true,hasVideo:true});
  flvInst.attachMediaElement(video); flvInst.load();
  flvInst.on(flvjs.Events.ERROR,(t,d)=>showError('FLV: '+t));
  flvInst.play(); document.getElementById('sStat').textContent=isLive?'HTTP-FLV':'FLV';
}
function loadNative(url) { currentEngine='native'; video.src=url; video.load(); video.play().catch(()=>{}); document.getElementById('sStat').textContent='MP4'; }
function startTicker() {
  ticker = setInterval(()=>{
    if(video.buffered.length>0){const a=Math.max(0,video.buffered.end(video.buffered.length-1)-video.currentTime);document.getElementById('bStat').textContent=a.toFixed(1)+'s';}
  },1000);
}

// ── CHANNELS ─────────────────────────
async function fetchChannels() {
  try {
    log('加载频道...','info');
    const res = await fetch('channels.json?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    channels = await res.json();
    log(`频道加载成功 (${channels.length}个)`,'ok');
    buildGroupTabs(); renderChannels();
  } catch(e) {
    log('频道加载失败: '+e.message,'err');
    chList.innerHTML='<div class="empty-ch">频道加载失败<br><span style="font-size:.58rem">请检查channels.json</span></div>';
  }
}
function buildGroupTabs() {
  const groups=['全部',...new Set(channels.map(c=>c.group||'其他'))];
  const tabs = document.getElementById('groupTabs');
  tabs.innerHTML='';
  groups.forEach(g=>{
    const btn=document.createElement('button');
    btn.className='group-tab'+(g===activeGroup?' active':'');
    btn.textContent=g;
    btn.onclick=()=>{ activeGroup=g; document.querySelectorAll('.group-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderChannels(); };
    tabs.appendChild(btn);
  });
}
function renderChannels() {
  const filtered = activeGroup==='全部' ? channels : channels.filter(c=>(c.group||'其他')===activeGroup);
  document.getElementById('chCount').textContent = filtered.length;
  chList.innerHTML='';
  if(filtered.length===0){chList.innerHTML='<div class="empty-ch">此分组暂无频道</div>';return;}
  filtered.forEach((ch,i)=>{
    const realIdx=channels.indexOf(ch);
    const p=ch.proto||detectProto(ch.url);
    const div=document.createElement('div');
    div.className='ch-item'+(realIdx===activeIdx?' active':'');
    div.innerHTML=`
      <div class="ch-play-btn"></div>
      <div class="ch-info">
        <div class="ch-name">${esc(ch.name)}</div>
        <div class="ch-meta">
          <span class="ch-proto">${protoLabel(p)}</span>
          ${ch.group?`<span class="ch-group">${esc(ch.group)}</span>`:''}
        </div>
      </div>`;
    div.addEventListener('click',()=>playCh(realIdx));
    chList.appendChild(div);
  });
}
function playCh(i) {
  activeIdx=i; renderChannels();
  const ch=channels[i];
  proto=ch.proto||'auto';
  document.querySelectorAll('.proto-btn').forEach(b=>b.classList.toggle('active',b.dataset.p===proto));
  loadStream(ch.url,ch.name);
  // scroll to top on mobile
  window.scrollTo({top:0,behavior:'smooth'});
}
function playManual() {
  const url=document.getElementById('manualUrl').value.trim();
  if(!url){log('请输入链接','err');return;}
  proto='auto';
  document.querySelectorAll('.proto-btn').forEach(b=>b.classList.toggle('active',b.dataset.p==='auto'));
  loadStream(url);
  window.scrollTo({top:0,behavior:'smooth'});
}

// INIT
urlInput.addEventListener('keydown',e=>{if(e.key==='Enter')loadStream();});
document.getElementById('manualUrl').addEventListener('keydown',e=>{if(e.key==='Enter')playManual();});
fetchChannels();
log('StreamLab v4.1 就绪','ok');
</script>
